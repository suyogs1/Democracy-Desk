<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Democracy Desk | Personal Election Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Google reCAPTCHA Enterprise -->
    <script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="background-blur" aria-hidden="true"></div>
    
    <header role="banner">
        <div class="logo">Democracy <span>Desk</span></div>
        <nav class="controls" aria-label="Region and Mode Settings">
            <select id="state-selector" aria-label="Select your state for regional guidance">
                <option value="California">California</option>
                <option value="Texas">Texas</option>
                <option value="New York">New York</option>
                <option value="Florida">Florida</option>
                <option value="Georgia">Georgia</option>
            </select>
            <select id="mode-selector" aria-label="Select explanation complexity">
                <option value="normal">Normal Mode</option>
                <option value="ELI10">ELI10 (Simple)</option>
            </select>
        </nav>
    </header>

    <main id="main-content">
        <section class="content-area" aria-labelledby="hero-title">
            <div class="hero">
                <h1 id="hero-title">Ready to Vote?</h1>
                <p>Personalized, jargon-free election guidance for your region.</p>
            </div>

            <div id="today-action-slot" aria-live="polite"></div>

            <div class="chat-container">
                <div id="explanation-box" class="explanation-text" aria-live="polite">
                    Select your state and ask a question to get started. 
                </div>

                <div id="timeline-stepper" class="timeline" aria-label="Step-by-step election plan">
                    <!-- Steps will be injected here -->
                </div>

                <form id="chat-form" class="input-area" aria-label="Election query form">
                    <button type="button" id="voice-btn" class="voice-btn" aria-label="Start voice input">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                    </button>
                    <input type="text" id="user-input" placeholder="Ask about registration or deadlines..." required aria-required="true">
                    <button type="submit" class="send-btn" id="send-btn" aria-label="Submit query">Get Plan</button>
                    <!-- reCAPTCHA badge container -->
                    <div id="recaptcha-badge"></div>
                </form>
                <audio id="ai-audio" hidden></audio>
            </div>
        </section>

        <aside aria-label="Technical Reasoning and Metadata">
            <div class="reasoning-panel">
                <div class="panel-header">AI Thinking Process</div>
                <div id="reasoning-slot" aria-live="log">
                    <p style="color: var(--text-muted); font-size: 0.8rem;">No active processing.</p>
                </div>
            </div>

            <div id="intent-panel" class="reasoning-panel" style="display: none;" aria-live="polite">
                <div class="panel-header">Detected Intent</div>
                <div id="intent-slot"></div>
            </div>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
